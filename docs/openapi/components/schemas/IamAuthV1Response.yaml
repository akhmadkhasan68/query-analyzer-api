type: object
required:
    - user
    - token
properties:
    user:
        $ref: ./UserV1Response.yaml
    token:
        type: object
        required:
            - access_token
            - refresh_token
            - expires_in
        properties:
            access_token:
                type: string
                example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            refresh_token:
                type: string
                example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            expires_in:
                type: integer
                description: Token expiration time in seconds
                example: 3600
