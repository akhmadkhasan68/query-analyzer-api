      parameters:
        - $ref: '#/components/parameters/PaginatePage'
        - $ref: '#/components/parameters/PaginatePerPage'
        - $ref: '#/components/parameters/PaginateSort'
        - $ref: '#/components/parameters/PaginateOrder'
        - $ref: '#/components/parameters/PaginateSearch'
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum:
              - low
