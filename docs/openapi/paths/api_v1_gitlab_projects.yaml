get:
    tags:
        - Gitlab
    summary: List GitLab projects (paginated)
    operationId: gitlabProjectList
    security:
        - AccessToken: []
    parameters:
        - $ref: ../components/parameters/PaginatePage.yaml
        - $ref: ../components/parameters/PaginatePerPage.yaml
        - $ref: ../components/parameters/PaginateSort.yaml
        - $ref: ../components/parameters/PaginateOrder.yaml
        - $ref: ../components/parameters/PaginateSearch.yaml
    responses:
        '200':
            description: Paginated GitLab projects list
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/GitlabProjectPaginatedResponse.yaml
        '401':
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorUnauthorizedResponse.yaml
        '403':
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorForbiddenResponse.yaml
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
