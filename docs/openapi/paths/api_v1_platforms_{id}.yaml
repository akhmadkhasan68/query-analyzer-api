get:
    tags:
        - Platforms
    summary: Get platform by ID
    operationId: platformGetById
    security:
        - AccessToken: []
    parameters:
        - name: id
          in: path
          required: true
          schema:
              type: string
              format: uuid
    responses:
        '200':
            description: Platform details
            content:
                application/json:
                    schema:
                        allOf:
                            - $ref: ../components/schemas/BaseResponse.yaml
                            - type: object
                              properties:
                                  data:
                                      $ref: ../components/schemas/PlatformV1Response.yaml
        '401':
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorUnauthorizedResponse.yaml
        '403':
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorForbiddenResponse.yaml
        '404':
            description: Not found
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorNotFoundResponse.yaml
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
put:
    tags:
        - Platforms
    summary: Update platform by ID
    operationId: platformUpdateById
    security:
        - AccessToken: []
    parameters:
        - name: id
          in: path
          required: true
          schema:
              type: string
              format: uuid
    requestBody:
        required: true
        content:
            application/json:
                schema:
                    type: object
                    required:
                        - framework
                        - orm_provider
                        - database_provider
                    properties:
                        framework:
                            type: string
                            minLength: 2
                            maxLength: 100
                            example: NestJS
                        orm_provider:
                            type: string
                            minLength: 2
                            maxLength: 100
                            example: TypeORM
                        database_provider:
                            type: string
                            minLength: 2
                            maxLength: 100
                            example: PostgreSQL
    responses:
        '200':
            description: Platform updated
            content:
                application/json:
                    schema:
                        allOf:
                            - $ref: ../components/schemas/BaseResponse.yaml
                            - type: object
                              properties:
                                  data:
                                      type: object
                                      nullable: true
                                      example: null
        '401':
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorUnauthorizedResponse.yaml
        '403':
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorForbiddenResponse.yaml
        '404':
            description: Not found
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorNotFoundResponse.yaml
        '422':
            description: Validation error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorValidationResponse.yaml
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
