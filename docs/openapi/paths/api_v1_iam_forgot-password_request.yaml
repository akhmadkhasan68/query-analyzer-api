post:
    tags:
        - Forgot Password
    summary: Request password reset
    operationId: iamForgotPasswordRequest
    security: []
    requestBody:
        required: true
        content:
            application/json:
                schema:
                    type: object
                    required:
                        - email
                    properties:
                        email:
                            type: string
                            format: email
                            example: user@example.com
                        redirect_url:
                            type: string
                            format: uri
                            nullable: true
                            example: https://app.example.com/reset-password
    responses:
        '200':
            description: Reset email sent
            content:
                application/json:
                    schema:
                        allOf:
                            - $ref: ../components/schemas/BaseResponse.yaml
                            - type: object
                              properties:
                                  data:
                                      type: object
                                      nullable: true
                                      example: null
        '422':
            description: Validation error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorValidationResponse.yaml
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
