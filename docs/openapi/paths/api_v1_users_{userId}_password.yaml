patch:
    tags:
        - Users
    summary: Update user password
    operationId: userUpdatePassword
    security:
        - AccessToken: []
    parameters:
        - name: userId
          in: path
          required: true
          schema:
              type: string
              format: uuid
    requestBody:
        required: true
        content:
            application/json:
                schema:
                    type: object
                    required:
                        - new_password
                    properties:
                        new_password:
                            type: string
                            minLength: 8
                            description: Must contain at least 1 number and 1 letter
                            example: NewSecurePass123
    responses:
        '200':
            description: Password updated
            content:
                application/json:
                    schema:
                        allOf:
                            - $ref: ../components/schemas/BaseResponse.yaml
                            - type: object
                              properties:
                                  data:
                                      $ref: ../components/schemas/UserV1Response.yaml
        '401':
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorUnauthorizedResponse.yaml
        '403':
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorForbiddenResponse.yaml
        '404':
            description: Not found
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorNotFoundResponse.yaml
        '422':
            description: Validation error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorValidationResponse.yaml
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
