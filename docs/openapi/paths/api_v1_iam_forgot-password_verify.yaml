post:
    tags:
        - Forgot Password
    summary: Verify password reset token
    operationId: iamForgotPasswordVerify
    security: []
    requestBody:
        required: true
        content:
            application/json:
                schema:
                    type: object
                    required:
                        - token
                    properties:
                        token:
                            type: string
                            example: abc123def456
    responses:
        '200':
            description: Token is valid
            content:
                application/json:
                    schema:
                        allOf:
                            - $ref: ../components/schemas/BaseResponse.yaml
                            - type: object
                              properties:
                                  data:
                                      type: object
                                      nullable: true
                                      example: null
        '422':
            description: Validation error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorValidationResponse.yaml
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
