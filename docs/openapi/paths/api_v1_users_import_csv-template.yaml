get:
    tags:
        - Users Import
    summary: Download CSV import template
    operationId: userImportCsvTemplate
    security:
        - AccessToken: []
    responses:
        '200':
            description: CSV template file
            content:
                text/csv:
                    schema:
                        type: string
                        format: binary
        '401':
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorUnauthorizedResponse.yaml
        '403':
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorForbiddenResponse.yaml
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
