post:
    tags:
        - Slack
    summary: Handle Slack slash command
    operationId: slackHandleCommand
    security: []
    parameters:
        - name: slashCommand
          in: path
          required: true
          schema:
              type: string
          description: Slash command name
    requestBody:
        required: true
        content:
            application/x-www-form-urlencoded:
                schema:
                    type: object
                    required:
                        - token
                        - team_id
                        - team_domain
                        - channel_id
                        - channel_name
                        - user_id
                        - user_name
                        - command
                        - api_app_id
                        - response_url
                        - trigger_id
                    properties:
                        token:
                            type: string
                        team_id:
                            type: string
                        team_domain:
                            type: string
                        channel_id:
                            type: string
                        channel_name:
                            type: string
                        user_id:
                            type: string
                        user_name:
                            type: string
                        command:
                            type: string
                        text:
                            type: string
                        api_app_id:
                            type: string
                        is_enterprise_install:
                            type: string
                        response_url:
                            type: string
                            format: uri
                        trigger_id:
                            type: string
    responses:
        '200':
            description: Command handled
            content:
                text/plain:
                    schema:
                        type: string
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
