post:
    tags:
        - Forgot Password
    summary: Reset password with token
    operationId: iamForgotPasswordReset
    security: []
    requestBody:
        required: true
        content:
            application/json:
                schema:
                    type: object
                    required:
                        - token
                        - password
                        - confirm_password
                    properties:
                        token:
                            type: string
                            example: abc123def456
                        password:
                            type: string
                            minLength: 8
                            description: Must contain at least 1 number and 1 letter
                            example: NewSecurePass123
                        confirm_password:
                            type: string
                            example: NewSecurePass123
    responses:
        '200':
            description: Password reset successful
            content:
                application/json:
                    schema:
                        allOf:
                            - $ref: ../components/schemas/BaseResponse.yaml
                            - type: object
                              properties:
                                  data:
                                      type: object
                                      nullable: true
                                      example: null
        '422':
            description: Validation error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorValidationResponse.yaml
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
