get:
    tags:
        - Role Permissions
    summary: List role permissions (paginated)
    operationId: rolePermissionList
    security:
        - AccessToken: []
    parameters:
        - name: roleId
          in: path
          required: true
          schema:
              type: string
              format: uuid
        - $ref: ../components/parameters/PaginatePage.yaml
        - $ref: ../components/parameters/PaginatePerPage.yaml
        - $ref: ../components/parameters/PaginateSort.yaml
        - $ref: ../components/parameters/PaginateOrder.yaml
        - $ref: ../components/parameters/PaginateSearch.yaml
        - name: slug
          in: query
          required: false
          schema:
              type: string
          description: Filter by permission slug
    responses:
        '200':
            description: Paginated permissions list for role
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/PermissionPaginatedResponse.yaml
        '401':
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorUnauthorizedResponse.yaml
        '403':
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorForbiddenResponse.yaml
        '404':
            description: Not found
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorNotFoundResponse.yaml
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
