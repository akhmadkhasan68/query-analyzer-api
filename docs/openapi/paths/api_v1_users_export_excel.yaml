get:
    tags:
        - Users Export
    summary: Export users to Excel
    operationId: userExportExcel
    security:
        - AccessToken: []
    responses:
        '200':
            description: Excel file
            content:
                application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
                    schema:
                        type: string
                        format: binary
        '401':
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorUnauthorizedResponse.yaml
        '403':
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorForbiddenResponse.yaml
        '500':
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/ErrorInternalServerResponse.yaml
